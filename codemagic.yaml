workflows:
  ios-build:
    name: IOS Capacitor Build (FINAL IPA + TestFlight)

    environment:
      xcode: 16.2
      node: 22

      ios_signing:
        certificates:
          - Pei_iOS_Cert
        provisioning_profiles:
          - PeiGo_Store_Final

    scripts:
      - name: Clean
        script: |
          rm -rf node_modules
          rm -rf ios/App/Pods
          rm -rf ios/App/build
          rm -rf ios/App/App.xcworkspace

      - name: Install dependencies
        script: |
          npm install

      - name: Build web
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Fix project (remove SwiftPM & fix signing)
        script: |
          gem install xcodeproj

          ruby <<EOF
          require 'xcodeproj'

          project_path = 'ios/App/App.xcodeproj'
          project = Xcodeproj::Project.open(project_path)

          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGN_STYLE'] = 'Automatic'
              config.build_settings.delete('PROVISIONING_PROFILE_SPECIFIER')
              config.build_settings.delete('PROVISIONING_PROFILE')
            end
          end

          project.save
          puts "Fixed signing settings"
          EOF

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build archive
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            DEVELOPMENT_TEAM=K3D34578Q7 \
            CODE_SIGN_STYLE=Automatic \
            archive

      - name: Export IPA
        script: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/ipa

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
