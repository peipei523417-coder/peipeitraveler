workflows:
  ios-build:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic-ios

    environment:
      xcode: 16.2
      node: 22
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.peipeigo.travel

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set version numbers
        script: |
          cd ios/App
          # $BUILD_NUMBER 是 Codemagic 自動給的序號，保證每次上傳都不重複
          agvtool new-marketing-version 1.0.$BUILD_NUMBER
          agvtool new-version -all $BUILD_NUMBER

      - name: Set up code signing
        script: |
          # 這行指令會自動去 Settings 抓你剛上傳的 P12 和 Profile
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS archive
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE=$CM_PROVISIONING_PROFILE_ID \
            CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Generate ExportOptions and export IPA
        script: |
          cat > $CM_BUILD_DIR/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.peipeigo.travel</key>
                  <string>peipeigo_profile</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -exportOptionsPlist $CM_BUILD_DIR/ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/build/ipa

    artifacts:
      - build/ipa/*.ipa

    publishing:
      email:
        recipients:
          - peitravel.dev@gmail.com
        notify:
          success: true
          failure: true
