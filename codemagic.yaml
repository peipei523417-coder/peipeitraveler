workflows:
  ios-build:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      node: 22
      groups:
        - app_store_credentials

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      # ✅ 安裝 P12（關鍵）
      - name: Install certificate
        script: |
          echo $CERTIFICATES_P12 | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k ~/Library/Keychains/build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s ~/Library/Keychains/build.keychain

      # ✅ 安裝 provisioning profile
      - name: Install provisioning profile
        script: |
          echo $CM_PROVISIONING_PROFILE | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS archive
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            DEVELOPMENT_TEAM=K3D34578Q7 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="PeiGo_Store_Final" \
            PRODUCT_BUNDLE_IDENTIFIER=com.peipeigo.travel \
            archive

    artifacts:
      - build/ios/ipa/*.ipa
