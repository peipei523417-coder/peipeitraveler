# 2026 最終版本：自動同步並發佈至 App Store
workflows:
  ios-build:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic-ios  # 這裡要對應你 Integrations 頁面的名字

    environment:
      xcode: 16.2
      node: 22
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.peipeigo.travel

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Sync Capacitor iOS (代替本地 Mac 執行)
        script: |
          npx cap sync ios

      - name: Set version numbers
        script: |
          cd ios/App
          # 設定為 Version 6，並隨 Build 次數自動遞增
          agvtool new-marketing-version 6.0.$BUILD_NUMBER
          agvtool new-version -all $BUILD_NUMBER

      - name: Set up code signing
        script: |
          keychain add-certificates
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/peipeigo_appstore.mobileprovision

      - name: Build iOS archive
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="peipeigo_appstore"

      - name: Generate ExportOptions and export IPA
        script: |
          cat > $CM_BUILD_DIR/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.peipeigo.travel</key>
                  <string>peipeigo_appstore</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -exportOptionsPlist $CM_BUILD_DIR/ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/build/ipa

    artifacts:
      - build/ipa/*.ipa

    publishing:
      app_store_connect:
        integration: codemagic-ios  # 這裡必須與上方 integrations 一致
      email:
        recipients:
          - peitravel.dev@gmail.com
        notify:
          success: true
          failure: true
