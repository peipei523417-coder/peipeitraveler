workflows:
  ios-build:
    name: iOS Capacitor Build (Pods Only Final)

    environment:
      xcode: 16.2
      node: 22
      ios_signing:
        certificates:
          - Pei_iOS_Cert
        provisioning_profiles:
          - PeiGo_Store_Final

    scripts:
      - name: Clean old dependencies and iOS generated files
        script: |
          rm -rf node_modules
          rm -f package-lock.json
          rm -f bun.lock
          rm -f bun.lockb
          rm -rf ios/App/Pods
          rm -rf ios/App/build
          rm -rf ios/App/App.xcworkspace
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Install dependencies with npm
        script: |
          npm install
          npm ls @capacitor/core @capacitor/ios @capacitor/app @capacitor/browser || true

      - name: Build web
        script: |
          npm run build

      - name: Remove local Swift Package references (CapApp-SPM)
        script: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("ios/App/App.xcodeproj/project.pbxproj")
          s = p.read_text()

          # Remove known CapApp-SPM references from your current pbxproj
          s = s.replace('''
          \t\t4D22ABE92AF431CB00220026 /* CapApp-SPM in Frameworks */ = {isa = PBXBuildFile; productRef = 4D22ABE82AF431CB00220026 /* CapApp-SPM */; };
          ''','''')

          s = s.replace('''
          \t\t\t\t4D22ABE92AF431CB00220026 /* CapApp-SPM in Frameworks */,
          ''','''')

          s = s.replace('''
          \t\t\t\t4D22ABE82AF431CB00220026 /* CapApp-SPM */,
          ''','''')

          s = s.replace('''
          \t\t\t\tD4C12C0A2AAA248700AAC8A2 /* XCLocalSwiftPackageReference "CapApp-SPM" */,
          ''','''')

          s = s.replace('''
          /* Begin XCLocalSwiftPackageReference section */
          \t\tD4C12C0A2AAA248700AAC8A2 /* XCLocalSwiftPackageReference "CapApp-SPM" */ = {
          \t\t\tisa = XCLocalSwiftPackageReference;
          \t\t\trelativePath = "CapApp-SPM";
          \t\t};
          /* End XCLocalSwiftPackageReference section */

          ''','''')

          s = s.replace('''
          /* Begin XCSwiftPackageProductDependency section */
          \t\t4D22ABE82AF431CB00220026 /* CapApp-SPM */ = {
          \t\t\tisa = XCSwiftPackageProductDependency;
          \t\t\tpackage = D4C12C0A2AAA248700AAC8A2 /* XCLocalSwiftPackageReference "CapApp-SPM" */;
          \t\t\tproductName = "CapApp-SPM";
          \t\t};
          /* End XCSwiftPackageProductDependency section */
          ''','''')

          p.write_text(s)
          print("Removed CapApp-SPM references from project.pbxproj")
          PY

      - name: Ensure Podfile exists
        script: |
          if [ ! -f ios/App/Podfile ]; then
            cat > ios/App/Podfile <<'EOF'
          platform :ios, '15.0'
          use_frameworks!

          install! 'cocoapods', :deterministic_uuids => false

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'CapacitorBrowser', :path => '../../node_modules/@capacitor/browser'
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF
          fi

          echo "=== Podfile ==="
          cat ios/App/Podfile

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Show iOS project files
        script: |
          ls -la ios/App
          test -d ios/App/App.xcworkspace && echo "WORKSPACE_FOUND=true" || echo "WORKSPACE_FOUND=false"

      - name: Build archive
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive

      - name: Export IPA
        script: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/ipa \
            -allowProvisioningUpdates

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
