workflows:
  ios-build:
    name: iOS Capacitor Build (FINAL IPA)

    environment:
      xcode: 16.2
      node: 22
      ios_signing:
        certificates:
          - Pei_iOS_Cert
        provisioning_profiles:
          - PeiGo_Store_Final

    scripts:
      - name: Clean old dependencies and iOS generated files
        script: |
          rm -rf node_modules
          rm -f package-lock.json
          rm -f bun.lock
          rm -f bun.lockb
          rm -rf ios/App/Pods
          rm -rf ios/App/build
          rm -rf ios/App/App.xcworkspace
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Install dependencies with npm
        script: |
          npm install
          npm ls @capacitor/core @capacitor/ios @capacitor/app @capacitor/browser || true

      - name: Build web
        script: |
          npm run build

      - name: Ensure Podfile exists
        script: |
          cat > ios/App/Podfile <<'EOF'
          platform :ios, '15.0'
          use_frameworks!

          install! 'cocoapods', :deterministic_uuids => false

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'CapacitorBrowser', :path => '../../node_modules/@capacitor/browser'
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
                config.build_settings['PROVISIONING_PROFILE'] = ''
              end
            end
          end
          EOF

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Fix project + set App signing
        script: |
          gem install xcodeproj -N || true

          ruby <<'RUBY'
          require 'xcodeproj'

          project = Xcodeproj::Project.open('ios/App/App.xcodeproj')

          project.targets.each do |target|
            # 移除 CapApp-SPM
            if target.respond_to?(:package_product_dependencies)
              target.package_product_dependencies.delete_if do |dep|
                dep.display_name.to_s.include?('CapApp-SPM')
              end
            end

            if target.name == 'App'
              target.build_configurations.each do |config|
                config.build_settings['DEVELOPMENT_TEAM'] = 'K3D34578Q7'
                config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'PeiGo_Store_Final'
                config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'com.peipeigo.travel'
              end
            end
          end

          project.save
          RUBY

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build archive
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive

      - name: Export IPA
        script: |
          cd ios/App

          cat > ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>K3D34578Q7</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.peipeigo.travel</key>
                  <string>PeiGo_Store_Final</string>
              </dict>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/ipa

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
