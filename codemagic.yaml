workflows:
  ios-build:
    name: iOS Capacitor Build (Pods Final)

    environment:
      xcode: 16.2
      node: 22
      ios_signing:
        certificates:
          - Pei_iOS_Cert
        provisioning_profiles:
          - PeiGo_Store_Final

    scripts:
      - name: Clean old dependencies and iOS generated files
        script: |
          rm -rf node_modules
          rm -f package-lock.json
          rm -f bun.lock
          rm -f bun.lockb
          rm -rf ios/App/Pods
          rm -rf ios/App/build
          rm -rf ios/App/App.xcworkspace
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Install dependencies with npm
        script: |
          npm install
          npm ls @capacitor/core @capacitor/ios @capacitor/app @capacitor/browser || true

      - name: Build web
        script: |
          npm run build

      - name: Ensure Podfile exists
        script: |
          cat > ios/App/Podfile <<'EOF'
          platform :ios, '15.0'
          use_frameworks!

          install! 'cocoapods', :deterministic_uuids => false

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'CapacitorBrowser', :path => '../../node_modules/@capacitor/browser'
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
              end
            end
          end
          EOF

          echo "=== Podfile ==="
          cat ios/App/Podfile

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Remove SwiftPM CapApp-SPM references safely
        script: |
          gem install xcodeproj -N || true

          ruby <<'RUBY'
          require 'xcodeproj'

          project_path = 'ios/App/App.xcodeproj'
          project = Xcodeproj::Project.open(project_path)

          project.targets.each do |target|
            if target.respond_to?(:package_product_dependencies)
              target.package_product_dependencies.delete_if do |dep|
                dep.display_name.to_s.include?('CapApp-SPM') ||
                dep.product_name.to_s.include?('CapApp-SPM')
              end
            end

            if target.respond_to?(:frameworks_build_phase) && target.frameworks_build_phase
              target.frameworks_build_phase.files.dup.each do |build_file|
                name = build_file.display_name.to_s
                ref_name = build_file.file_ref ? build_file.file_ref.display_name.to_s : ''
                if name.include?('CapApp-SPM') || ref_name.include?('CapApp-SPM')
                  target.frameworks_build_phase.remove_build_file(build_file)
                end
              end
            end
          end

          if project.root_object.respond_to?(:package_references)
            project.root_object.package_references.delete_if do |pkg|
              pkg.display_name.to_s.include?('CapApp-SPM') ||
              (pkg.respond_to?(:relative_path) && pkg.relative_path.to_s.include?('CapApp-SPM'))
            end
          end

          project.save
          puts 'Removed CapApp-SPM SwiftPM references safely'
          RUBY

          grep -n "CapApp-SPM" ios/App/App.xcodeproj/project.pbxproj || echo "CapApp-SPM removed from pbxproj"

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          ls -la

      - name: Show iOS project files
        script: |
          ls -la ios/App
          test -d ios/App/App.xcworkspace && echo "WORKSPACE_FOUND=true" || echo "WORKSPACE_FOUND=false"
          test -d ios/App/Pods && echo "PODS_FOUND=true" || echo "PODS_FOUND=false"

      - name: Build archive
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            DEVELOPMENT_TEAM=K3D34578Q7 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

      - name: Export IPA
        script: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/ipa \
            -allowProvisioningUpdates

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
