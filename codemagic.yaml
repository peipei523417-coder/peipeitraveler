workflows:
  ios-build:
    name: iOS Capacitor Build

    environment:
      xcode: 16.2
      node: 22

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.peipeigo.travel

      groups:
        - app_store_credentials   # ← 這行很關鍵（API key）

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Build IPA
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            DEVELOPMENT_TEAM=K3D34578Q7 \
            CODE_SIGN_STYLE=Automatic \
            archive

    artifacts:
      - $CM_BUILD_DIR/**/*.ipa
