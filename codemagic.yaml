workflows:
  ios-build:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic-ios

    environment:
      xcode: 16.2
      node: 22
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.peipeigo.travel

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set version numbers
        script: |
          cd ios/App
          # 使用 $BUILD_NUMBER 自動跳號，解決上傳重複版本問題
          agvtool new-marketing-version 1.0.$BUILD_NUMBER
          agvtool new-version -all $BUILD_NUMBER

      - name: Set up code signing
        script: |
          # 強制載入 Settings 裡的 P12 證書
          keychain add-certificates
          
          # 強制手動解碼准考證，確保 Xcode 一定看得到它
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/peipeigo_appstore.mobileprovision

      - name: Build iOS archive
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="peipeigo_appstore"

      - name: Generate ExportOptions and export IPA
        script: |
          cat > $CM_BUILD_DIR/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.peipeigo.travel</key>
                  <string>peipeigo_appstore</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -exportOptionsPlist $CM_BUILD_DIR/ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/build/ipa

    artifacts:
      - build/ipa/*.ipa

    publishing:
      email:
        recipients:
          - peitravel.dev@gmail.com
        notify:
          success: true
          failure: true
