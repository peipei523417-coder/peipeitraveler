workflows:
  ios-build:
    name: iOS Capacitor Build (Safe Final)

    environment:
      xcode: 16.2
      node: 22
      ios_signing:
        certificates:
          - Pei_iOS_Cert
        provisioning_profiles:
          - PeiGo_Store_Final

    scripts:
      - name: Clean old dependencies and iOS generated files
        script: |
          rm -rf node_modules
          rm -f package-lock.json
          rm -f bun.lock
          rm -f bun.lockb
          rm -rf ios/App/Pods
          rm -rf ios/App/build
          rm -rf ios/App/App.xcworkspace
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Install dependencies with npm
        script: |
          npm install
          npm ls @capacitor/core @capacitor/ios @capacitor/app @capacitor/browser || true

      - name: Build web
        script: |
          npm run build

      - name: Ensure Podfile exists
        script: |
          if [ ! -f ios/App/Podfile ]; then
            cat > ios/App/Podfile <<'EOF'
          platform :ios, '15.0'
          use_frameworks!

          install! 'cocoapods', :deterministic_uuids => false

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'CapacitorBrowser', :path => '../../node_modules/@capacitor/browser'
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF
          fi

          echo "=== Podfile ==="
          cat ios/App/Podfile

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Show iOS project files
        script: |
          ls -la ios/App
          test -d ios/App/App.xcworkspace && echo "WORKSPACE_FOUND=true" || echo "WORKSPACE_FOUND=false"
          test -d ios/App/Pods && echo "PODS_FOUND=true" || echo "PODS_FOUND=false"

      - name: Build archive
        script: |
          cd ios/App
          if [ -d "App.xcworkspace" ]; then
            echo "Using workspace build"
            xcodebuild \
              -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -archivePath $CM_BUILD_DIR/App.xcarchive \
              DEVELOPMENT_TEAM=K3D34578Q7 \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              PROVISIONING_PROFILE_SPECIFIER="PeiGo_Store_Final" \
              archive
          else
            echo "Using project build"
            xcodebuild \
              -project App.xcodeproj \
              -scheme App \
              -configuration Release \
              -archivePath $CM_BUILD_DIR/App.xcarchive \
              DEVELOPMENT_TEAM=K3D34578Q7 \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              PROVISIONING_PROFILE_SPECIFIER="PeiGo_Store_Final" \
              archive
          fi

      - name: Export IPA
        script: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/ipa \
            -allowProvisioningUpdates

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
