workflows:
  ios-build:
    name: iOS Capacitor Build

    environment:
      xcode: 16.2
      node: 22

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Build IPA (AUTO SIGNING)
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            DEVELOPMENT_TEAM=K3D34578Q7 \
            PRODUCT_BUNDLE_IDENTIFIER=com.peipeigo.travel \
            -allowProvisioningUpdates \
            archive

    artifacts:
      - build/**/*.ipa
