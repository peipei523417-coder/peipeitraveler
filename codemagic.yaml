workflows:
  ios-build:
    name: iOS Capacitor Build

    environment:
      xcode: 16.2
      node: 22

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.peipeigo.travel

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build IPA
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive

    artifacts:
      - build/ios/ipa/*.ipa
