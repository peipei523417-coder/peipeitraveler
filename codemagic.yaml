      - name: Fix project + remove SwiftPM + set App signing
        script: |
          gem install xcodeproj -N || true

          ruby <<'RUBY'
          require 'xcodeproj'

          project = Xcodeproj::Project.open('ios/App/App.xcodeproj')

          # Remove all local/package references related to CapApp-SPM / Capacitor SwiftPM
          project.objects.delete_if do |obj|
            text = obj.to_ascii_plist.to_s rescue obj.to_s
            text.include?('CapApp-SPM') ||
            text.include?('capacitor-swift-pm') ||
            text.include?('XCLocalSwiftPackageReference') ||
            text.include?('XCSwiftPackageProductDependency')
          end

          project.targets.each do |target|
            # Remove package product dependencies
            if target.respond_to?(:package_product_dependencies)
              target.package_product_dependencies.clear
            end

            # Remove duplicate SPM frameworks from App target
            if target.respond_to?(:frameworks_build_phase) && target.frameworks_build_phase
              target.frameworks_build_phase.files.dup.each do |build_file|
                name = build_file.display_name.to_s
                ref_name = build_file.file_ref ? build_file.file_ref.display_name.to_s : ''
                if name.include?('Capacitor') || name.include?('Cordova') ||
                   ref_name.include?('Capacitor') || ref_name.include?('Cordova') ||
                   name.include?('CapApp-SPM') || ref_name.include?('CapApp-SPM')
                  target.frameworks_build_phase.remove_build_file(build_file)
                end
              end
            end

            if target.name == 'App'
              target.build_configurations.each do |config|
                config.build_settings['DEVELOPMENT_TEAM'] = 'K3D34578Q7'
                config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'PeiGo_Store_Final'
                config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'com.peipeigo.travel'
              end
            end
          end

          if project.root_object.respond_to?(:package_references)
            project.root_object.package_references.clear
          end

          project.save
          puts 'Removed SwiftPM references and duplicate frameworks; set App target signing'
          RUBY

          echo "=== Remaining SPM/CapApp references ==="
          grep -nE "CapApp-SPM|capacitor-swift-pm|XCLocalSwiftPackageReference|XCSwiftPackageProductDependency" ios/App/App.xcodeproj/project.pbxproj || echo "No SwiftPM references"
