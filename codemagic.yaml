workflows:
  ios-build:
    name: iOS Capacitor Build (Codemagic Signing)

    environment:
      xcode: 16.2
      node: 22
      ios_signing:
        certificates:
          - Pei_iOS_Cert
        provisioning_profiles:
          - PeiGo_Store_Final

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build archive
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportPath $CM_BUILD_DIR/ipa \
            -allowProvisioningUpdates

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
