name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Verify dist output
        run: |
          echo "=== Checking dist/ contents ==="
          ls -la dist/
          test -f dist/index.html && echo "✅ index.html exists" || (echo "❌ index.html missing!" && exit 1)

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Verify embedded assets
        run: |
          echo "=== Checking Android assets ==="
          ls -la android/app/src/main/assets/public/
          test -f android/app/src/main/assets/public/index.html && echo "✅ Embedded assets OK" || (echo "❌ Assets missing!" && exit 1)

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Verify build.gradle config
        run: |
          echo "=== Verifying build config ==="
          grep -n "applicationId" android/app/build.gradle
          grep -n "versionCode" android/app/build.gradle
          grep -n "versionName" android/app/build.gradle
          echo "App ID: com.peitravel.smartplanner"
          echo "Version Code: 19"
          echo "Version Name: 1.0.19"

      - name: Build release AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v1.0.19-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 7
