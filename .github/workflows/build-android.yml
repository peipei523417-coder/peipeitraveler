name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Debug repository structure
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== ls root ==="
          ls -la
          echo "=== package.json location ==="
          find . -name "package.json" -not -path "*/node_modules/*" | head -20
          echo "=== index.html location ==="
          find . -name "index.html" -not -path "*/node_modules/*" -not -path "*/android/*" | head -20
          echo "=== main.tsx location ==="
          find . -name "main.tsx" -not -path "*/node_modules/*" | head -20
          echo "=== vite.config location ==="
          find . -name "vite.config.*" -not -path "*/node_modules/*" | head -20
          echo "=== src/ exists? ==="
          ls -la src/ 2>/dev/null || echo "NO src/ in root!"
          echo "=== index.html content ==="
          cat index.html 2>/dev/null || echo "NO index.html in root!"
          echo "=== package.json build script ==="
          grep -A2 '"build"' package.json 2>/dev/null || echo "NO package.json in root!"

      - name: Build web assets (Vite production build)
        run: |
          echo "=== pwd before build ==="
          pwd
          echo "=== Confirming index.html, src/, vite.config.ts exist ==="
          test -f index.html && echo "✅ index.html" || echo "❌ index.html MISSING"
          test -d src && echo "✅ src/" || echo "❌ src/ MISSING"
          test -f vite.config.ts && echo "✅ vite.config.ts" || echo "❌ vite.config.ts MISSING"
          echo "=== Running Vite production build ==="
          npx vite build
          echo "=== Vite build complete ==="
          echo "=== Listing dist/ ==="
          ls -laR dist/
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Verify dist output (MUST be full production build)
        run: |
          echo "=== Checking dist/ contents ==="
          ls -la dist/
          test -f dist/index.html && echo "✅ index.html exists" || (echo "❌ index.html missing!" && exit 1)
          echo "=== dist/assets/ ==="
          ls -la dist/assets/ || echo "No assets dir"
          echo "=== dist total size ==="
          DIST_SIZE=$(du -sk dist/ | cut -f1)
          echo "dist/ size: ${DIST_SIZE}KB"
          if [ "$DIST_SIZE" -lt 500 ]; then
            echo "❌ FATAL: dist/ is only ${DIST_SIZE}KB — this is NOT a full production build!"
            echo "Expected at least 500KB+ with JS/CSS bundles."
            exit 1
          fi
          echo "✅ dist/ size looks correct: ${DIST_SIZE}KB"
          echo "=== JS bundle count ==="
          JS_COUNT=$(find dist/assets -name "*.js" 2>/dev/null | wc -l)
          echo "JS files: $JS_COUNT"
          if [ "$JS_COUNT" -lt 1 ]; then
            echo "❌ FATAL: No JS bundles found in dist/assets/"
            exit 1
          fi
          echo "✅ JS bundles present"

      - name: Sync Capacitor Android
        run: |
          echo "=== Running npx cap sync android ==="
          npx cap sync android
          echo "=== Sync complete ==="

      - name: Verify embedded assets (MUST EXIST)
        run: |
          echo "=== Checking Android embedded assets ==="
          if [ ! -d "android/app/src/main/assets/public" ]; then
            echo "❌ FATAL: android/app/src/main/assets/public/ does NOT exist!"
            echo "npx cap sync failed to copy web assets."
            exit 1
          fi
          ls -la android/app/src/main/assets/public/
          test -f android/app/src/main/assets/public/index.html && echo "✅ index.html embedded" || (echo "❌ index.html missing in assets!" && exit 1)
          echo "=== Checking capacitor.config.json ==="
          test -f android/app/src/main/assets/capacitor.config.json && echo "✅ capacitor.config.json exists" || (echo "❌ capacitor.config.json missing!" && exit 1)
          cat android/app/src/main/assets/capacitor.config.json
          echo ""
          echo "=== Verifying NO server.url in config ==="
          if grep -q '"url"' android/app/src/main/assets/capacitor.config.json; then
            echo "❌ FATAL: server.url found in capacitor.config.json! App will load remote URL!"
            cat android/app/src/main/assets/capacitor.config.json
            exit 1
          fi
          echo "✅ No server.url — app will load from capacitor://localhost"
          echo "=== Checking capacitor-cordova-android-plugins ==="
          ls -la android/capacitor-cordova-android-plugins/ || echo "⚠️ cordova plugins dir missing"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Verify build.gradle config
        run: |
          echo "=== Verifying build config ==="
          grep -n "applicationId" android/app/build.gradle
          grep -n "versionCode" android/app/build.gradle
          grep -n "versionName" android/app/build.gradle
          echo "App ID: com.peitravel.smartplanner"
          echo "Version Code: 34"
          echo "Version Name: 1.0.34"

      - name: Build release AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v1.0.34-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 7
