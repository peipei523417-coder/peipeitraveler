name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Install Capacitor CLI
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Verify build.gradle config
        run: |
          echo "=== Verifying build config ==="
          grep -n "applicationId" android/app/build.gradle
          grep -n "versionCode" android/app/build.gradle
          grep -n "versionName" android/app/build.gradle
          echo "App ID: com.peitravel.smartplanner"
          echo "Version Code: 6"
          echo "Version Name: 6.0.0"

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v6.0.0
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
