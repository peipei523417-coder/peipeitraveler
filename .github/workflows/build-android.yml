name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify Capacitor config (local mode)
        run: |
          grep -q "webDir: 'dist'" capacitor.config.ts || (echo "❌ webDir is not dist" && exit 1)
          if grep -q "server:\s*{" capacitor.config.ts; then
            echo "❌ server config detected in capacitor.config.ts (remote fallback risk)"
            exit 1
          fi
          echo "✅ Capacitor config is local-webview mode"

      - name: Build web assets (Vite production build)
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Verify dist output
        run: |
          test -f dist/index.html || (echo "❌ dist/index.html missing!" && exit 1)
          test -d dist/assets || (echo "❌ dist/assets missing!" && exit 1)
          DIST_SIZE=$(du -sk dist/ | cut -f1)
          echo "dist/ size: ${DIST_SIZE}KB"
          if [ "$DIST_SIZE" -lt 500 ]; then
            echo "❌ dist/ too small (${DIST_SIZE}KB) — not a full production build!"
            exit 1
          fi
          JS_COUNT=$(find dist/assets -name "*.js" 2>/dev/null | wc -l)
          if [ "$JS_COUNT" -lt 1 ]; then
            echo "❌ No JS bundles in dist/assets/"
            exit 1
          fi
          echo "✅ dist/ verified: ${DIST_SIZE}KB, ${JS_COUNT} JS bundles"

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Verify embedded assets in Android project
        run: |
          test -f android/app/src/main/assets/public/index.html || (echo "❌ android/app/src/main/assets/public/index.html missing!" && exit 1)
          test -d android/app/src/main/assets/public/assets || (echo "❌ android/app/src/main/assets/public/assets missing!" && exit 1)
          test -f android/app/src/main/assets/capacitor.config.json || (echo "❌ capacitor.config.json missing in Android assets" && exit 1)
          if grep -q '"url"' android/app/src/main/assets/capacitor.config.json; then
            echo "❌ server.url found in generated capacitor.config.json — remote fallback would happen"
            cat android/app/src/main/assets/capacitor.config.json
            exit 1
          fi
          echo "✅ Android embedded assets verified (local index + assets folder + no server.url)"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build release AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Verify AAB contains local web assets
        run: |
          AAB_PATH="android/app/build/outputs/bundle/release/app-release.aab"
          test -f "$AAB_PATH" || (echo "❌ AAB not found at $AAB_PATH" && exit 1)
          unzip -l "$AAB_PATH" | grep -q "assets/public/index.html" || (echo "❌ AAB missing assets/public/index.html" && exit 1)
          unzip -l "$AAB_PATH" | grep -q "assets/public/assets/" || (echo "❌ AAB missing assets/public/assets/" && exit 1)
          echo "✅ AAB verified: local web assets are bundled"

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v1.0.43-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 7
