<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes" />
    <title>PeiPeiGoTravel - 智慧旅遊規劃</title>
    <meta name="description" content="PeiPeiGoTravel 智慧旅遊規劃工具，輕鬆建立與管理你的旅行行程。" />
    <meta name="author" content="PeiPeiGoTravel" />

    <meta property="og:title" content="PeiPeiGoTravel - 智慧旅遊規劃" />
    <meta property="og:description" content="輕鬆建立與管理你的旅行行程" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PeiPeiGoTravel" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Redirect clean /share/XXX paths — on mobile, try native app first
      (function() {
        var path = window.location.pathname;
        var match = path.match(/^\/share\/(.+)/);
        if (!match) return;

        var projectId = match[1];
        var ua = navigator.userAgent;
        var isMobile = /iPhone|iPad|iPod|Android/i.test(ua);
        var isNative = /capacitor/i.test(ua) || window.Capacitor;

        if (isMobile && !isNative) {
          // Mobile web: try to open the travel app via deep link
          var deepLink = 'com.peitravel.smartplanner://share/' + projectId;
          var didLeave = false;
          window.addEventListener('blur', function() { didLeave = true; });
          window.location.href = deepLink;

          // If app didn't open after 1.5s, fall back to web share page
          setTimeout(function() {
            if (!didLeave) {
              window.location.replace(window.location.origin + '/#/share/' + projectId);
            }
          }, 1500);
        } else {
          // Desktop or native app: just redirect to hash route
          window.location.replace(window.location.origin + '/#/share/' + projectId);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
