<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes" />
    <title>PeiPeiGoTravel - 智慧旅遊規劃</title>
    <meta name="description" content="PeiPeiGoTravel 智慧旅遊規劃工具，輕鬆建立與管理你的旅行行程。" />
    <meta name="author" content="PeiPeiGoTravel" />

    <meta property="og:title" content="PeiPeiGoTravel - 智慧旅遊規劃" />
    <meta property="og:description" content="輕鬆建立與管理你的旅行行程" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PeiPeiGoTravel" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      /**
       * FAST OAuth callback relay — runs BEFORE main.tsx loads.
       * Detects native_callback=1 and immediately deep-links to the app.
       * No React boot, no fonts, no analytics. Target: <100ms hand-off.
       */
      (function() {
        try {
          var search = window.location.search || '';
          var hash = window.location.hash || '';
          var qs = new URLSearchParams(search);
          var hp = hash.indexOf('#') === 0 ? new URLSearchParams(hash.substring(1)) : new URLSearchParams();
          var state = hp.get('state') || qs.get('state') || '';
          var isCb = qs.get('native_callback') === '1' || state.indexOf('native_oauth_') === 0;
          if (!isCb) return;

          var scheme = qs.get('scheme') || '';
          if (!scheme && state.indexOf('native_oauth_') === 0) {
            var rest = state.substring('native_oauth_'.length);
            if (rest.indexOf('com.peipeigo.travel_') === 0) scheme = 'com.peipeigo.travel';
            else if (rest.indexOf('com.peitravel.smartplanner_') === 0) scheme = 'com.peitravel.smartplanner';
          }
          if (!scheme) scheme = 'com.peitravel.smartplanner';

          var suffix = '';
          var at = hp.get('access_token');
          var rt = hp.get('refresh_token');
          var code = qs.get('code');
          if (at && rt) {
            suffix = '?access_token=' + encodeURIComponent(at) + '&refresh_token=' + encodeURIComponent(rt);
          } else if (code) {
            suffix = '?code=' + encodeURIComponent(code);
          }

          // Paint a tiny branded screen synchronously (no external fonts/CSS)
          document.documentElement.style.background = '#fff';
          document.write('<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#111;font-size:14px;">正在返回 App…</div>');

          // Fire deep link immediately — no setTimeout, no waiting
          window.location.replace(scheme + '://auth/callback' + suffix);
          // Stop further script execution on this page
          throw new Error('__oauth_relay_done__');
        } catch (e) {
          if (e && e.message === '__oauth_relay_done__') throw e;
        }
      })();

      // Redirect clean /share/XXX paths — on mobile, try native app first
      (function() {
        var path = window.location.pathname;
        var match = path.match(/^\/share\/(.+)/);
        if (!match) return;

        var projectId = match[1];
        var ua = navigator.userAgent;
        var isMobile = /iPhone|iPad|iPod|Android/i.test(ua);
        var isNative = /capacitor/i.test(ua) || window.Capacitor;

        if (isMobile && !isNative) {
          // Mobile web: try to open the travel app via deep link
          var deepLink = 'com.peitravel.smartplanner://share/' + projectId;
          var didLeave = false;
          window.addEventListener('blur', function() { didLeave = true; });
          window.location.href = deepLink;

          // If app didn't open after 1.5s, fall back to web share page
          setTimeout(function() {
            if (!didLeave) {
              window.location.replace(window.location.origin + '/#/share/' + projectId);
            }
          }, 1500);
        } else {
          // Desktop or native app: just redirect to hash route
          window.location.replace(window.location.origin + '/#/share/' + projectId);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
